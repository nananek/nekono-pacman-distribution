name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    # Trigger conditions:
    #   - any PR open/sync/reopen
    #   - PR review comment mentioning @claude (= 人による mention のみ、
    #     bot 投稿は除外して self-trigger spam を防ぐ)
    #   - issue/PR comment mentioning @claude (同上)
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    # diff スコープ review なので機械的 bump は数十秒で終わる。20min は
    # deep path (source/build 変更) が稀に長引いた時の安全マージン。
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 現在の HEAD commit に対する verdict comment が既にあれば Claude を起動しない。
      # 旧実装は「verdict comment が 1 件でもあれば skip」だったため、
      # request-changes → 修正 push のたびに手動 comment 削除が必要だった。
      # 新実装は「verdict comment のタイムスタンプ > HEAD commit のタイムスタンプ」
      # を条件にする (= 同一 commit に対する重複投稿のみ防止)。
      - name: Skip if already reviewed for this commit
        id: skip-check
        env:
          GH_TOKEN: ${{ github.token }}
          # PR 番号は github context から直接取得。gh pr list --head は
          # detached HEAD 状態で git にブランチを問い合わせて失敗するため使わない。
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if [[ -z "$PR_NUMBER" ]]; then
            echo "result=review" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          commit_ts=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$GITHUB_SHA" \
            --jq '.committer.date')
          last_verdict_ts=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '[.comments[] | select(.author.login == "claude") |
                   select(.body | contains("**verdict:"))]
                  | sort_by(.createdAt) | last | .createdAt // ""')
          echo "commit_ts=$commit_ts  last_verdict_ts=$last_verdict_ts"
          if [[ -n "$last_verdict_ts" && "$last_verdict_ts" > "$commit_ts" ]]; then
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "[skip] verdict already posted for $GITHUB_SHA (verdict=$last_verdict_ts > commit=$commit_ts)"
          else
            echo "result=review" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.skip-check.outputs.result != 'skip'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # `gh pr comment` を allow して Claude が直接 PR conversation に
          # 投稿できるようにする。default では Bash tool が制限されてて、
          # action 内蔵の buffered inline comment 経路を Claude が選ばない
          # ため silent で終わる事案があった。
          #
          # Read/Grep/Glob/`gh pr diff` も明示 allow する。これが無いと
          # claude-code-action@v1 (moving tag) の 2026-06 中旬の挙動変更後、
          # review session が diff/PKGBUILD を読もうとして permission 拒否を
          # 連発し (1 run で 22 denials 観測)、verdict comment を post せず
          # silent に success 終了していた (= #240 以降 verdict 0 件)。
          claude_args: '--allowed-tools Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh api:*)'
          prompt: |
            This repo (`nekono-pacman-distribution`) is a self-hosted pacman
            package distribution for Arch Linux. It contains PKGBUILDs forked
            from AUR plus build/sign/serve tooling. Packages are signed by
            the owner's GPG (`483DC691DF9F29327EA106BD030130E2F156CD74`) and
            served over Tailscale.

            あなたは PR の **diff だけ** を supply-chain 観点で review する。
            **repo 全体を読みにいかないこと** (= 過去に毎回フル read して
            15min timeout で cancelled → verdict 0 件になっていた)。効率最優先、
            必要な変更ファイルだけ最小限 read し、少ない turn で verdict を出す。

            ## 手順

            ### 1. 冪等性 check (必須、最初に 1 回)

            ```
            PR_NUMBER=${{ github.event.pull_request.number || github.event.issue.number }}
            commit_ts=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$GITHUB_SHA" --jq '.committer.date')
            last_verdict_ts=$(gh pr view "$PR_NUMBER" --json comments \
              --jq '[.comments[] | select(.author.login == "claude") | select(.body | contains("**verdict:"))] | sort_by(.createdAt) | last | .createdAt // ""')
            if [[ -n "$last_verdict_ts" && "$last_verdict_ts" > "$commit_ts" ]]; then
              echo "[skip] verdict already posted for $GITHUB_SHA"; exit 0
            fi
            ```
            現 HEAD commit より後に verdict があれば **何もせず終了**。

            ### 2. diff を取得して分類

            まず `gh pr diff "$PR_NUMBER"` (大きければ `--name-only` 併用) で
            **変更ファイルと hunk** を見る。この diff だけで下記に分類する。

            - **fast path (機械的 bump)**: 変更が次の機械的更新 *のみ* の場合 ―
              - `PKGBUILD` の `pkgrel` 行のみ (`pkgver` / `source` / `*sums` /
                `prepare`/`build`/`package` / `depends`/`makedepends` は無変更)
              - `.deps.lock` の version 行
              - `.SRCINFO` の `pkgrel` / version 同期
              - `REVIEW.md` の更新履歴行追記
              → **追加で一切 read せず**、即 `verdict: approve` を 1 コメント。
                本文は差分の要点 2-3 行で十分 (例: `cython 3.2.6-1 → 3.2.6-2`,
                `pkgrel` +1)。

            - **deep path (実質変更)**: diff が次のいずれかを触る時 *だけ* 深く見る ―
              `source=` / `sha256sums`/`sha512sums`/`b2sums` / `pkgver` /
              `prepare()`/`build()`/`package()` / `depends`/`makedepends`/`optdepends` /
              `*.install` / `bin/` 配下 / `.github/` 配下 / ファイルの新規追加・削除。
              → **変更されたファイルだけ** read し、変更 hunk に絞って確認:
              - `source` URL が upstream official path か (typosquat/spoof/mirror 無し)
              - 全 external source に非 `SKIP` の checksum が pin されてるか
                (git ref なら pinned commit SHA / signed tag を優先)
              - `prepare/build/package` に source=() 外の network fetch /
                `curl | sh` / 不透明 binary 実行 / 怪しい `eval`・動的コマンド構築が無いか
              - `depends`/`makedepends`/`optdepends` が変更内容と整合するか
              - 関連あれば AUR の現行 PKGBUILD と比較し、REVIEW.md に正当化の
                無い乖離が無いか
              - `bin/` script は injection (unquoted `$var` / `eval` / `IFS`) と
                GPG secret / Tailscale state の扱いを確認
              - diff に secret (private key/token/password/`.gpg`/ssh key) が無いか
              変更と無関係な他 package / 既存コードは read しない。

            ### 3. 投稿 (1 回のみ)

            `gh pr comment "$PR_NUMBER" --body "<markdown>"` を **正確に 1 回** 実行。
            (過去に 1 PR へ 11 comment 付けたインシデントあり。2 回目呼び出し禁止、
            user の Anthropic usage を無駄にするため。)
            - 1 行目に **verdict: approve / request-changes / block** を必ず入れる。
            - fast path は verdict 行 + 2-3 行要約で十分。deep path は検証項目別の
              OK/NG を簡潔にまとめる。
            - 行依存 line comment (`gh pr review --comment`) は使用禁止。全 finding を
              1 comment にまとめる。
            投稿成功したら **即終了**。追加の確認 read は不要。

            日本語で書くこと。
