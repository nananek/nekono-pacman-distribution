# 各 pkg の upstream latest version を監視する nvchecker 設定。
# daily cron (.github/workflows/upstream-version-issue.yml) で nvchecker を
# 実行 → PKGBUILD の現 pkgver と差分があれば Claude 事前調査 + Issue を立てる。
#
# 主要な flag (各 section で個別指定):
#   - use_latest_release = true : GitHub Releases (or GitLab Releases) の
#                                  最新 release tag_name を見る。安定運用。
#                                  release を切らない repo では使えない。
#   - use_max_tag = true        : 全 tag から semver 最大を取る。release が
#                                  無い repo / pre-release も含めたい場合に。
#                                  どちらも指定しない default は "chronological
#                                  latest tag" で、moby のように cron job が
#                                  毎日 master HEAD に YYYYMMDD.HHMMSS tag を
#                                  打つ repo では誤検知の温床になるので避ける。
#   - prefix = "..."            : tag_name から strip して PKGBUILD pkgver と
#                                  比較できる形にする。
#
# source 種別:
#   - github / gitlab : git host の tag / release を見る
#   - npm             : npm registry の latest dist-tag
#
# section 名 = pkgs/<name> ディレクトリ名と一致させる (workflow 側で照合)。
# 新規 package を追加した時はここに section を足す。

# nvchecker の state file path 指定 (CLI に --newver/--oldver は無く、こちらで
# 静的に指定する仕様)。oldver は workflow 内で空ファイルとして用意し、newver
# を出力 → detect_upstream_updates.py が PKGBUILD と比較する。
[__config__]
oldver = "oldver.json"
newver = "newver.json"

[claude-code]
# Anthropic Claude Code CLI。downloads.claude.ai 経由配布だが npm registry
# にも同 version で publish される (@anthropic-ai/claude-code)。npm の方が
# version 取得が安定。
source = "npm"
npm = "@anthropic-ai/claude-code"

[docker-rootless-extras]
# Docker Engine と version sync (rootless extras は moby/moby tree の subset)。
# release tag は "docker-vX.Y.Z" 形式なので prefix を strip。use_latest_release
# を付けないと default の chronological latest tag が moby cron job 由来の
# "YYYYMMDD.HHMMSS" を返してしまう (= Issue #24 で踏んだ事故の根本原因)。
source = "github"
github = "moby/moby"
use_latest_release = true
prefix = "docker-v"

[localsend-bin]
# release tag "vX.Y.Z" 形式。
source = "github"
github = "localsend/localsend"
use_latest_release = true
prefix = "v"

[moonlight-qt]
# release tag "vX.Y.Z" 形式。
source = "github"
github = "moonlight-stream/moonlight-qt"
use_latest_release = true
prefix = "v"

[nekonopaw]
# 自作 package (nananek/nekonopaw)。GitHub Release は未運用で tag のみ
# (vX.Y.Z 形式) push しているので use_max_tag で semver 最大 tag を取る。
source = "github"
github = "nananek/nekonopaw"
use_max_tag = true
prefix = "v"

[pam_pkcs11]
# OpenSC は release tag に "pam_pkcs11-X.Y.Z" の prefix を付ける。
source = "github"
github = "OpenSC/pam_pkcs11"
use_latest_release = true
prefix = "pam_pkcs11-"

[pass-secret-service]
# pass を D-Bus org.freedesktop.secrets backend にする bridge (Rust 実装、
# grimsteel/pass-secret-service)。release tag は "vX.Y.Z"。
source = "github"
github = "grimsteel/pass-secret-service"
use_latest_release = true
prefix = "v"

[pika-backup]
# GNOME 系は gitlab.gnome.org でホスト。tag は素の X.Y.Z 形式 (v prefix 無し)、
# pre-release を含む全 tag から semver 最大を取りたいので use_max_tag。
source = "gitlab"
gitlab = "World/pika-backup"
host = "gitlab.gnome.org"
use_max_tag = true

[pwvucontrol]
# release tag は素の X.Y.Z 形式 (prefix 無し)。
source = "github"
github = "saivert/pwvucontrol"
use_latest_release = true

[python-httpx-sse]
# fastmcp 依存 chain transitive (= fastmcp → mcp → httpx-sse)、 AUR
# python-httpx-sse を fork。 release tag は素の X.Y.Z 形式 (prefix 無し)。
# (= PR #55 で merge し忘れた entry を本 PR の sweep として retroactive 追加)
source = "github"
github = "florimondmanca/httpx-sse"
use_latest_release = true

[python-jsonschema-path]
# fastmcp 依存 chain (= fastmcp → mcp → openapi-pydantic → jsonschema-path)。
# Arch 公式 + AUR 不在で [nekono] 自家 PyPI sdist vendor。 source = github、
# release tag は素の X.Y.Z 形式 (prefix 無し)。
# (= PR #54 で merge し忘れた entry を本 PR の sweep として retroactive 追加)
source = "github"
github = "p1c2u/jsonschema-path"
use_latest_release = true

[python-mcp]
# fastmcp の直接依存 (= fastmcp → mcp)、 AUR python-mcp を fork。
# Model Context Protocol SDK 本体。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "modelcontextprotocol/python-sdk"
use_latest_release = true
prefix = "v"

[python-openapi-pydantic]
# fastmcp 依存 chain transitive (= fastmcp → mcp → openapi-pydantic)、 AUR
# python-openapi-pydantic を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
# 注意: 当 PKGBUILD は AUR と同じく 0.5.1 release 後の commit (= Python 3.14
# 対応 PR #73 merge) を snapshot pin。 nvchecker は upstream release を見るので、
# 0.6.0 等 clean tag が出たらそちらに乗り換える判断材料を issue で提供する。
source = "github"
github = "mike-oakley/openapi-pydantic"
use_latest_release = true
prefix = "v"

[python-sse-starlette]
# fastmcp 依存 chain transitive (= fastmcp → mcp → sse-starlette)、 AUR
# python-sse-starlette を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "sysid/sse-starlette"
use_latest_release = true
prefix = "v"

[python-uncalled-for]
# fastmcp の transitive 依存 (= fastmcp → uncalled-for)、 AUR
# python-uncalled-for を fork。 release tag は素の X.Y.Z 形式 (prefix 無し)。
# 注意: upstream は 0.3.x まで進んでいるが fastmcp 3.2.4 が 0.2.0 を要求するため
# 当面 0.2.0 で固定 (= 検知 issue が立ったら fastmcp 側 bump と整合判断)。
source = "github"
github = "chrisguidry/uncalled-for"
use_latest_release = true

[python-uv-dynamic-versioning]
# python-mcp の makedepends (= hatchling 動的 versioning plugin)、 AUR
# python-uv-dynamic-versioning を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "ninoseki/uv-dynamic-versioning"
use_latest_release = true
prefix = "v"

[qview]
# release tag は素の X.Y.Z 形式 (prefix 無し)。
source = "github"
github = "jurplel/qView"
use_latest_release = true

[voicevox-bin]
# VOICEVOX editor (= Electron 製 GUI)。 release tag は素の X.Y.Z 形式
# (prefix 無し)。 [nekono] には CPU AppImage 1 variant のみ (= system electron37
# 経由で起動する voicevox-bin) を投入している。
source = "github"
github = "VOICEVOX/voicevox"
use_latest_release = true

[voicevox-engine-cuda]
# VOICEVOX engine (= TTS HTTP API server)。 release tag は素の X.Y.Z 形式
# (prefix 無し)。 pkgname を voicevox-engine-cuda にして CUDA variant 化して
# いるが、 upstream の release は CPU/NVIDIA/macOS など全 variant が同 tag に
# 紐づくので、 monitoring は asset 種別と独立に tag 名のみで十分。
source = "github"
github = "VOICEVOX/voicevox_engine"
use_latest_release = true
