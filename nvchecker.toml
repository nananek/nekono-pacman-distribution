# 各 pkg の upstream latest version を監視する nvchecker 設定。
# daily cron (.github/workflows/upstream-version-issue.yml) で nvchecker を
# 実行 → PKGBUILD の現 pkgver と差分があれば Claude 事前調査 + Issue を立てる。
#
# 主要な flag (各 section で個別指定):
#   - use_latest_release = true : GitHub Releases (or GitLab Releases) の
#                                  最新 release tag_name を見る。安定運用。
#                                  release を切らない repo では使えない。
#   - use_max_tag = true        : 全 tag から semver 最大を取る。release が
#                                  無い repo / pre-release も含めたい場合に。
#                                  どちらも指定しない default は "chronological
#                                  latest tag" で、moby のように cron job が
#                                  毎日 master HEAD に YYYYMMDD.HHMMSS tag を
#                                  打つ repo では誤検知の温床になるので避ける。
#   - prefix = "..."            : tag_name から strip して PKGBUILD pkgver と
#                                  比較できる形にする。
#
# source 種別:
#   - github / gitlab : git host の tag / release を見る
#   - npm             : npm registry の latest dist-tag
#
# section 名 = pkgs/<name> ディレクトリ名と一致させる (workflow 側で照合)。
# 新規 package を追加した時はここに section を足す。

# nvchecker の state file path 指定 (CLI に --newver/--oldver は無く、こちらで
# 静的に指定する仕様)。oldver は workflow 内で空ファイルとして用意し、newver
# を出力 → detect_upstream_updates.py が PKGBUILD と比較する。
[__config__]
oldver = "oldver.json"
newver = "newver.json"

[claude-code]
# Anthropic Claude Code CLI。downloads.claude.ai 経由配布だが npm registry
# にも同 version で publish される (@anthropic-ai/claude-code)。npm の方が
# version 取得が安定。
source = "npm"
npm = "@anthropic-ai/claude-code"

[docker-rootless-extras]
# Docker Engine と version sync (rootless extras は moby/moby tree の subset)。
# release tag は "docker-vX.Y.Z" 形式なので prefix を strip。use_latest_release
# を付けないと default の chronological latest tag が moby cron job 由来の
# "YYYYMMDD.HHMMSS" を返してしまう (= Issue #24 で踏んだ事故の根本原因)。
source = "github"
github = "moby/moby"
use_latest_release = true
prefix = "docker-v"

[ff2mpv-rust]
# Firefox 拡張 "ff2mpv" の native messaging host (Rust 実装、ryze312/
# ff2mpv-rust)。AUR `ff2mpv-rust` を fork。Python upstream
# (woodruffw/ff2mpv) は GitHub Releases 未運用 + AUR には -git 版しか無いため
# Rust 版を採用 (= 規約 「-git 避ける」 を満たす唯一の選択肢)。
# release tag は素の X.Y.Z 形式 (prefix 無し)。
source = "github"
github = "ryze312/ff2mpv-rust"
use_latest_release = true

[genshin-dict]
# 自家 package (AUR 不在)。 Genshin Impact 固有名詞 Mozc 辞書。
# release tag は "vX.Y.Z" 形式。
source = "github"
github = "kotofurumiya/genshin-dict"
use_latest_release = true
prefix = "v"

[okaguchi-lawyer-dicterm]
# 自家 package (AUR 不在)。WordPress ブログ配布。
# download ページの JSON-LD dateModified を YYYYMMDD に変換して pkgver と比較。
source = "cmd"
cmd = "python3 .github/scripts/nvchecker-scrapers/okaguchi-lawyer-dicterm.py"

[debuyoko-seiyuu-dicterm]
# 自家 package (AUR 不在)。WordPress ブログ配布。
# ページ本文の「※N件 YYYY/M/D」形式の更新日を YYYYMMDD に変換して pkgver と比較。
source = "cmd"
cmd = "python3 .github/scripts/nvchecker-scrapers/debuyoko-seiyuu-dicterm.py"

[icecast]
# Xiph.Org Foundation の HTTP audio streaming server。release tag は素の
# X.Y.Z 形式 (prefix 無し)。depends の libigloo も nekono repo で管理。
source = "github"
github = "xiph/icecast-server"
use_latest_release = true

[libigloo]
# Icecast 2.5.x が必須とする共通 C フレームワーク。release tag は素の
# X.Y.Z 形式 (prefix 無し)。xiph/igloo は GitHub Release を切らず tag のみ
# のため use_max_tag で semver 最大を取る。
source = "github"
github = "xiph/igloo"
use_max_tag = true

[localsend-bin]
# release tag "vX.Y.Z" 形式。
source = "github"
github = "localsend/localsend"
use_latest_release = true
prefix = "v"

[sunshine-bin]
# Sunshine (LizardByte) = Moonlight 用セルフホスト配信ホスト。moonlight-qt の対
# (本機自身を配信ホスト化してリモート操作)。release tag は "v<CalVer>" 形式
# (例: v2026.516.143833) なので prefix "v" を strip。upstream release に公式
# Arch pkg.tar.zst が同梱されるため -bin 化。
source = "github"
github = "LizardByte/Sunshine"
use_latest_release = true
prefix = "v"

[nekono-btkeycast]
# 自家 package。 キーボードを BLE HID-over-GATT (HOGP) で iPad へ転送する
# 常駐デーモン + waybar モジュール。 release tag は vX.Y.Z 形式 (prefix "v")。
source = "github"
github = "nananek/nekono-btkeycast"
use_latest_release = true
prefix = "v"

[nekono-pipewire-mcp]
# 自家 source、 claude-code MCP server (wpctl wrapper)。 release tag は
# v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "nananek/nekono-pipewire-mcp"
use_latest_release = true
prefix = "v"

[nekono-voicevox-mcp]
# 自家 package。 GitHub Release を切る運用、 v0.1.0 から開始。
# voicevox-engine-cuda (= nekono-pacman0 で daemon 化) の HTTP API client を
# stdio MCP server として ayaka 上の claude-code に exposing する。
source = "github"
github = "nananek/nekono-voicevox-mcp"
use_latest_release = true
prefix = "v"

[nekonopaw]
# 自作 package (nananek/nekonopaw)。GitHub Release は未運用で tag のみ
# (vX.Y.Z 形式) push しているので use_max_tag で semver 最大 tag を取る。
source = "github"
github = "nananek/nekonopaw"
use_max_tag = true
prefix = "v"

[pam_pkcs11]
# OpenSC は release tag に "pam_pkcs11-X.Y.Z" の prefix を付ける。
source = "github"
github = "OpenSC/pam_pkcs11"
use_latest_release = true
prefix = "pam_pkcs11-"

[pass-secret-service]
# pass を D-Bus org.freedesktop.secrets backend にする bridge (Rust 実装、
# grimsteel/pass-secret-service)。release tag は "vX.Y.Z"。
source = "github"
github = "grimsteel/pass-secret-service"
use_latest_release = true
prefix = "v"

[pwvucontrol]
# release tag は素の X.Y.Z 形式 (prefix 無し)。
source = "github"
github = "saivert/pwvucontrol"
use_latest_release = true

[python-beartype]
# python-py-key-value-aio の dep (= fastmcp の dep audit で発覚)、 AUR
# python-beartype を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "beartype/beartype"
use_latest_release = true
prefix = "v"

[python-cyclopts]
# fastmcp の直接依存 (= fastmcp の dep audit で発覚)、 AUR python-cyclopts
# を fork。 release tag は v X.Y.Z 形式 (prefix "v")、 upstream は
# BrianPugh/cyclopts。
source = "github"
github = "BrianPugh/cyclopts"
use_latest_release = true
prefix = "v"

[python-docstring-parser]
# python-cyclopts の dep (= fastmcp の dep audit で発覚)、 AUR
# python-docstring-parser を fork。 release tag は素の X.Y.Z 形式
# (prefix 無し)、 upstream は rr-/docstring_parser。
source = "github"
github = "rr-/docstring_parser"
use_latest_release = true

[python-fastmcp]
# fastmcp chain の頂点、 ayaka 上の MCP server runtime を支える。
# AUR python-fastmcp を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
# 3.3.0 以降は fastmcp-slim が実コード (fastmcp は空 meta-pkg)。
# jlowin/fastmcp → PrefectHQ/fastmcp に migration 済み (2026-05-21 更新)。
source = "github"
github = "PrefectHQ/fastmcp"
use_latest_release = true
prefix = "v"

[python-jsonschema-path]
# fastmcp 依存 chain (= fastmcp → mcp → openapi-pydantic → jsonschema-path)。
# Arch 公式 + AUR 不在で [nekono] 自家 PyPI sdist vendor。 source = github、
# release tag は素の X.Y.Z 形式 (prefix 無し)。
# (= PR #54 で merge し忘れた entry を本 PR の sweep として retroactive 追加)
source = "github"
github = "p1c2u/jsonschema-path"
use_latest_release = true

[python-jsonref]
# fastmcp の直接依存 (= upstream pyproject.toml audit で発覚)、 AUR
# python-jsonref を fork。 PyPI sdist 直接 vendor (= upstream
# gazpachoking/jsonref の GitHub Releases 経路で監視)。 release tag は
# vX.Y.Z 形式 (prefix "v")。
source = "github"
github = "gazpachoking/jsonref"
use_latest_release = true
prefix = "v"

[python-mcp]
# fastmcp の直接依存 (= fastmcp → mcp)、 AUR python-mcp を fork。
# Model Context Protocol SDK 本体。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "modelcontextprotocol/python-sdk"
use_latest_release = true
prefix = "v"

[python-openapi-pydantic]
# fastmcp 依存 chain transitive (= fastmcp → mcp → openapi-pydantic)、 AUR
# python-openapi-pydantic を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
# 注意: 当 PKGBUILD は AUR と同じく 0.5.1 release 後の commit (= Python 3.14
# 対応 PR #73 merge) を snapshot pin。 nvchecker は upstream release を見るので、
# 0.6.0 等 clean tag が出たらそちらに乗り換える判断材料を issue で提供する。
source = "github"
github = "mike-oakley/openapi-pydantic"
use_latest_release = true
prefix = "v"

[python-pdm-pep517]
# python-jsonref の build-backend (pdm.pep517.api)、 AUR python-pdm-pep517
# を fork。 upstream pdm-pep517 は PyPI で 1.1.4 frozen (後継は pdm-backend)。
# GitHub タグ監視は pdm-backend のタグ (v2.x) を誤検知するため PyPI に変更。
source = "pypi"
pypi = "pdm-pep517"

[python-py-key-value-aio]
# fastmcp の直接依存 (= upstream pyproject.toml の
# 'py-key-value-aio[filetree,keyring,memory]>=0.4.4')、 AUR
# python-py-key-value-aio を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "chrisguidry/py-key-value-aio"
use_latest_release = true
prefix = "v"

[python-rich-rst]
# python-cyclopts の dep (= fastmcp の dep audit で発覚)、 AUR
# python-rich-rst を fork。 release tag は v X.Y.Z 形式 (prefix "v")、
# upstream は wasi-master/rich-rst。
source = "github"
github = "wasi-master/rich-rst"
use_latest_release = true
prefix = "v"

[python-sse-starlette]
# fastmcp 依存 chain transitive (= fastmcp → mcp → sse-starlette)、 AUR
# python-sse-starlette を fork。 release tag は v X.Y.Z 形式 (prefix "v")。
source = "github"
github = "sysid/sse-starlette"
use_latest_release = true
prefix = "v"

[python-uncalled-for]
# fastmcp の transitive 依存 (= fastmcp → uncalled-for)、 AUR
# python-uncalled-for を fork。 release tag は素の X.Y.Z 形式 (prefix 無し)。
# 注意: upstream は 0.3.x まで進んでいるが fastmcp 3.2.4 が 0.2.0 を要求するため
# 当面 0.2.0 で固定 (= 検知 issue が立ったら fastmcp 側 bump と整合判断)。
source = "github"
github = "chrisguidry/uncalled-for"
use_latest_release = true

prefix = "v"

[qview]
# release tag は素の X.Y.Z 形式 (prefix 無し)。
source = "github"
github = "jurplel/qView"
use_latest_release = true

[shairport-sync-airplay2]
# extra/shairport-sync (4.3.5-4) を fork して --with-airplay-2 を有効化した
# 自家 variant。upstream は extra と共通 (mikebrady/shairport-sync)。
# release tag は素の X.Y.Z 形式 (prefix 無し)。
# 注意: extra 側 PKGBUILD の bump (depends / configure_args 構成) も合わせて
# 追従する必要があるため、新 release を拾った Issue では extra 側の packaging
# diff も併せて確認する旨を REVIEW.md「更新方針」に記載済み。
source = "github"
github = "mikebrady/shairport-sync"
use_latest_release = true

[electron37-bin]
# voicevox-bin の depends=(electron37) を満たす prebuilt electron。 Arch 公式
# extra が electron37 を rolling で落としたため (37.10.3 で追跡開始時点)、
# electron/electron 公式 GitHub Release の prebuilt zip を [nekono] で
# self-host。 release tag は "vX.Y.Z" 形式。
#
# **major を 37 に固定監視** (= voicevox-bin 側が VOICEVOX package.json で
# electron 37.7.1 に pin されており、 major を跨ぐ bump は Node ABI / Electron
# API 非互換のリスクがあるため追従しない)。 tag 一覧から semver 最大を取る
# use_max_tag + include_regex で v37.* のみに絞り込む。
source = "github"
github = "electron/electron"
use_max_tag = true
include_regex = "v37\\..*"
prefix = "v"

[voicevox-bin]
# VOICEVOX editor (= Electron 製 GUI)。 release tag は素の X.Y.Z 形式
# (prefix 無し)。 [nekono] には CPU AppImage 1 variant のみ (= system electron37
# 経由で起動する voicevox-bin、 electron37 は [nekono] 自家 electron37-bin
# package で提供) を投入している。
source = "github"
github = "VOICEVOX/voicevox"
use_latest_release = true

